<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chermash Pay</title>
    <!-- Подключаем библиотеку для работы с камерой -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-black: #0b0b0b;
            --card-gray: #1c1c1e;
            --text-gray: #8e8e93;
            --accent-yellow: #ffdd2d;
            --accent-blue: #007aff;
        }

        body {
            margin: 0;
            background: var(--bg-black);
            font-family: -apple-system, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .main-screen {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Название фото теперь "чермашка" */
        .chermash-logo {
            width: 85%;
            max-width: 320px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .qr-button {
            background: var(--accent-yellow);
            color: black;
            border: none;
            padding: 22px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 221, 45, 0.4);
            transition: transform 0.2s;
        }

        .qr-button:active {
            transform: scale(0.92);
        }

        /* Стили сканера */
        #scanner-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 999;
            display: none;
            flex-direction: column;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        .close-scanner {
            position: absolute;
            top: 50px;
            right: 20px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="main-screen">
        <!-- Используем фото "чермашка" -->
        <img src="чермашка.jpg" alt="Чермаш" class="chermash-logo">
        <h1>ЧЕРМАШ</h1>

        <button class="qr-button" onclick="startScanner()">
            📷 СКАНЕР QR
        </button>
    </div>

    <!-- Полноэкранный сканер -->
    <div id="scanner-container">
        <button class="close-scanner" onclick="stopScanner()">Закрыть</button>
        <div id="reader"></div>
    </div>

    <script>
        let html5QrCode;

        async function startScanner() {
            // Показываем контейнер сканера
            document.getElementById('scanner-container').style.display = 'flex';
            
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, // Частота кадров
                qrbox: { width: 280, height: 280 } // Рамка сканирования
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, // Используем заднюю камеру
                    config,
                    (decodedText) => {
                        // ДЕЙСТВИЕ ПРИ УСПЕХЕ:
                        stopScanner();
                        
                        // Если в QR зашита ссылка — мгновенно переходим по ней
                        if (decodedText.startsWith('http')) {
                            window.location.href = decodedText;
                        } else {
                            // Если просто текст — выводим его
                            alert("Сканировано: " + decodedText);
                        }
                    }
                );
            } catch (err) {
                console.error("Ошибка камеры:", err);
                alert("Не удалось включить камеру. Проверьте разрешения.");
                stopScanner();
            }
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                }).catch(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            } else {
                document.getElementById('scanner-container').style.display = 'none';
            }
        }
    </script>
</body>
</html>
